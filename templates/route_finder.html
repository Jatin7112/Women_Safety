<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickRoute - Fast Route Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0C0E14;
            --card: #151821;
            --card-hover: #1C1F2B;
            --border: #252836;
            --fg: #E4E5EA;
            --muted: #6B7084;
            --accent: #FF6B35;
            --accent-glow: rgba(255,107,53,0.3);
            --fuel: #22C55E;
            --fuel-glow: rgba(34,197,94,0.35);
            --police: #60A5FA;
            --police-glow: rgba(96,165,250,0.35);
            --hospital: #F87171;
            --hospital-glow: rgba(248,113,113,0.35);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;display:flex;}

        /* Sidebar */
        .sidebar{width:340px;min-width:340px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;transition:transform .3s ease;}
        .sidebar-header{padding:20px 24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--card) 0%,#1a1520 100%);}
        .sidebar-header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;}
        .sidebar-header h1 span{color:var(--accent);}
        .sidebar-header p{font-size:12px;color:var(--muted);margin-top:4px;}

        .search-section{padding:20px 24px;border-bottom:1px solid var(--border);}
        .input-group{position:relative;margin-bottom:12px;}
        .input-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
        .input-group input{width:100%;padding:10px 14px 10px 38px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--fg);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
        .input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
        .input-group .input-icon{position:absolute;bottom:12px;left:12px;font-size:10px;}
        .input-group .input-icon.green{color:var(--fuel);}
        .input-group .input-icon.red{color:var(--hospital);}

        .btn-row{display:flex;gap:8px;margin-top:16px;}
        .btn-primary{flex:1;padding:11px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-primary:hover{background:#e85d2a;transform:translateY(-1px);box-shadow:0 4px 15px var(--accent-glow);}
        .btn-primary:active{transform:translateY(0);}
        .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
        .btn-secondary{padding:11px 14px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .2s;}
        .btn-secondary:hover{color:var(--fg);border-color:var(--muted);}

        .route-info{padding:14px 24px;border-bottom:1px solid var(--border);display:none;}
        .route-info.active{display:flex;gap:16px;}
        .route-stat{flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:10px;}
        .route-stat .value{font-size:20px;font-weight:700;color:var(--accent);}
        .route-stat .label{font-size:11px;color:var(--muted);margin-top:2px;}

        /* POI Sections */
        .poi-sections{flex:1;overflow-y:auto;padding:16px 24px;}
        .poi-sections::-webkit-scrollbar{width:4px;}
        .poi-sections::-webkit-scrollbar-track{background:transparent;}
        .poi-sections::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

        .poi-category{margin-bottom:12px;}
        .poi-category-header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;transition:background .2s;user-select:none;}
        .poi-category-header:hover{background:var(--card-hover);}
        .poi-category-header .emoji{font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
        .poi-category-header .emoji.fuel-bg{background:rgba(34,197,94,.15);}
        .poi-category-header .emoji.police-bg{background:rgba(96,165,250,.15);}
        .poi-category-header .emoji.hospital-bg{background:rgba(248,113,113,.15);}
        .poi-category-header .name{flex:1;font-size:14px;font-weight:600;}
        .poi-category-header .count{font-size:12px;color:var(--muted);background:var(--card);padding:2px 8px;border-radius:6px;font-weight:600;}
        .poi-category-header .chevron{color:var(--muted);font-size:12px;transition:transform .25s;}
        .poi-category-header.expanded .chevron{transform:rotate(180deg);}

        .poi-list{max-height:0;overflow:hidden;transition:max-height .35s ease;}
        .poi-list.expanded{max-height:600px;overflow-y:auto;}
        .poi-list::-webkit-scrollbar{width:3px;}
        .poi-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

        .poi-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-top:3px;border-radius:8px;cursor:pointer;transition:background .15s;}
        .poi-item:hover{background:var(--card-hover);}
        .poi-item .poi-emoji{font-size:18px;}
        .poi-item .poi-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .poi-item .poi-arrow{color:var(--muted);font-size:11px;opacity:0;transition:opacity .15s;}
        .poi-item:hover .poi-arrow{opacity:1;}

        .loading-indicator{display:flex;align-items:center;justify-content:center;gap:8px;padding:30px 20px;color:var(--muted);font-size:13px;}
        .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* Map */
        .map-container{flex:1;position:relative;}
        #map{width:100%;height:100%;}

        /* Start / End Markers */
        .endpoint-marker{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:3px solid #fff;font-weight:700;font-size:15px;color:#fff;font-family:'Space Grotesk',sans-serif;position:relative;}
        .endpoint-marker.start{background:var(--fuel);box-shadow:0 3px 15px var(--fuel-glow);}
        .endpoint-marker.end{background:var(--hospital);box-shadow:0 3px 15px var(--hospital-glow);}
        .endpoint-marker::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid;opacity:0;animation:mpulse 2s ease-out infinite;}
        .endpoint-marker.start::after{border-color:var(--fuel);}
        .endpoint-marker.end::after{border-color:var(--hospital);}
        @keyframes mpulse{0%{transform:scale(1);opacity:.5;}100%{transform:scale(2.4);opacity:0;}}

        /* POI Map Markers */
        .poi-map-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s,filter .2s;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));}
        .poi-map-marker:hover{transform:scale(1.18) translateY(-3px);filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}

        .poi-pin{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;position:relative;}
        .poi-pin .pin-e{font-size:22px;line-height:1;}
        .poi-pin::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;}
        .poi-pin.fuel{background:var(--fuel);box-shadow:0 3px 14px var(--fuel-glow);}
        .poi-pin.fuel::after{border-top:8px solid var(--fuel);}
        .poi-pin.police{background:var(--police);box-shadow:0 3px 14px var(--police-glow);}
        .poi-pin.police::after{border-top:8px solid var(--police);}
        .poi-pin.hospital{background:var(--hospital);box-shadow:0 3px 14px var(--hospital-glow);}
        .poi-pin.hospital::after{border-top:8px solid var(--hospital);}

        .poi-lbl{margin-top:8px;font-size:10px;font-weight:600;color:#fff;background:rgba(12,14,20,.85);padding:2px 7px;border-radius:5px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;text-align:center;backdrop-filter:blur(4px);}

        /* Leaflet Popups */
        .leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--fg)!important;border-radius:12px!important;border:1px solid var(--border)!important;box-shadow:0 8px 30px rgba(0,0,0,.4)!important;}
        .leaflet-popup-tip{background:var(--card)!important;}
        .leaflet-popup-content{margin:12px 16px!important;font-family:'Space Grotesk',sans-serif!important;font-size:13px!important;line-height:1.5!important;}
        .popup-title{font-weight:600;font-size:15px;margin-bottom:2px;}
        .popup-type{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
        .popup-coords{font-size:11px;color:var(--muted);margin-top:4px;}

        /* Toast */
        .toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
        .toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;transform:translateX(120%);transition:transform .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:340px;pointer-events:auto;}
        .toast.show{transform:translateX(0);}
        .toast-error{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;}
        .toast-success{background:#14532d;color:#86efac;border:1px solid #166534;}
        .toast-info{background:#1e293b;color:#94a3b8;border:1px solid #334155;}

        /* Click Hint */
        .click-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(21,24,33,.92);backdrop-filter:blur(12px);padding:10px 20px;border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--muted);z-index:1000;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap;}
        .hint-key{background:var(--border);padding:2px 8px;border-radius:5px;font-weight:600;color:var(--fg);font-size:11px;}

        /* Mobile Toggle */
        .mobile-toggle{display:none;position:absolute;top:16px;left:16px;z-index:1001;width:44px;height:44px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.3);}

        /* Leaflet Control Overrides */
        .leaflet-control-zoom{border:none!important;box-shadow:0 4px 15px rgba(0,0,0,.3)!important;border-radius:10px!important;overflow:hidden;}
        .leaflet-control-zoom a{background:var(--card)!important;color:var(--fg)!important;border:1px solid var(--border)!important;width:36px!important;height:36px!important;line-height:36px!important;font-size:16px!important;}
        .leaflet-control-zoom a:hover{background:var(--card-hover)!important;}
        .leaflet-control-zoom a+a{border-top:none!important;}
        .leaflet-control-attribution{background:rgba(21,24,33,.8)!important;color:var(--muted)!important;font-size:10px!important;padding:2px 8px!important;}
        .leaflet-control-attribution a{color:var(--accent)!important;}

        /* Route line dash animation */
        .route-dash{stroke-dasharray:12 8;animation:dashFlow .8s linear infinite;}
        @keyframes dashFlow{to{stroke-dashoffset:-20;}}

        /* Empty State */
        .empty-state{text-align:center;padding:30px 20px;color:var(--muted);}
        .empty-state .empty-icon{font-size:42px;margin-bottom:12px;opacity:.4;}
        .empty-state p{font-size:13px;line-height:1.6;}

        /* Responsive */
        @media(max-width:768px){
            .sidebar{position:absolute;top:0;left:0;height:100%;transform:translateX(-100%);z-index:1000;box-shadow:4px 0 30px rgba(0,0,0,.5);}
            .sidebar.open{transform:translateX(0);}
            .mobile-toggle{display:flex;}
            .click-hint{bottom:12px;font-size:11px;padding:8px 14px;}
        }
        @media(prefers-reduced-motion:reduce){
            .endpoint-marker::after,.route-dash,.spinner{animation:none!important;}
            .poi-map-marker{transition:none!important;}
        }
    </style>
</head>
<body>
    <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Quick<span>Route</span></h1>
            <p>Fast routes with nearby essentials</p>
        </div>
        <div class="search-section">
            <div class="input-group">
                <label>Starting Point</label>
                <i class="fas fa-circle input-icon green"></i>
                <input type="text" id="startInput" placeholder="Type location or click map..." autocomplete="off">
            </div>
            <div class="input-group">
                <label>Destination</label>
                <i class="fas fa-circle input-icon red"></i>
                <input type="text" id="endInput" placeholder="Type location or click map..." autocomplete="off">
            </div>
            <div class="btn-row">
                <button class="btn-primary" id="findRouteBtn">
                    <i class="fas fa-route"></i>
                    Find Route
                </button>
                <button class="btn-secondary" id="locBtn" title="Use my location">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button class="btn-secondary" id="clearBtn" title="Clear all">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
        <div class="route-info" id="routeInfo">
            <div class="route-stat">
                <div class="value" id="routeDistance">--</div>
                <div class="label">Distance</div>
            </div>
            <div class="route-stat">
                <div class="value" id="routeTime">--</div>
                <div class="label">Duration</div>
            </div>
        </div>
        <div class="poi-sections" id="poiSections">
            <div class="loading-indicator" id="poiLoading">
                <div class="spinner"></div>
                <span>Searching nearby places...</span>
            </div>
        </div>
    </aside>

    <div class="map-container">
        <div id="map"></div>
        <div class="click-hint" id="clickHint">
            <span class="hint-key">Click</span> set start
            <span style="margin:0 2px;opacity:.4;">|</span>
            <span class="hint-key">Shift+Click</span> set destination
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ==========================================
           State
        ========================================== */
        let map, startMarker, endMarker;
        let routeLayers = [];
        let poiMarkers = [];
        let startCoords = null;
        let endCoords = null;
        let routeController = null;

        /* ==========================================
           Map Init
        ========================================== */
        function initMap() {
            map = L.map('map', {
                center: [28.6139, 77.2090],
                zoom: 13,
                zoomControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
                maxZoom: 19,
                subdomains: 'abcd'
            }).addTo(map);

            // Click on map to set points
            map.on('click', function(e) {
                if (e.originalEvent.shiftKey) {
                    setEndPoint(e.latlng.lat, e.latlng.lng);
                    if (startCoords) findRoute();
                } else {
                    setStartPoint(e.latlng.lat, e.latlng.lng);
                    if (endCoords) findRoute();
                }
            });

            // Try geolocation for initial center
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                        loadPOIsAround(pos.coords.latitude, pos.coords.longitude, 5000);
                    },
                    function() {
                        loadPOIsAround(28.6139, 77.2090, 5000);
                    },
                    { timeout: 5000 }
                );
            } else {
                loadPOIsAround(28.6139, 77.2090, 5000);
            }
        }

        /* ==========================================
           Marker Factories
        ========================================== */
        function makeEndpointIcon(cls, letter) {
            return L.divIcon({
                className: '',
                html: '<div class="endpoint-marker ' + cls + '">' + letter + '</div>',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });
        }

        function makePOIIcon(type, name) {
            var cfg = {
                fuel:    { emoji: '⛽', cls: 'fuel' },
                police:  { emoji: '🚔', cls: 'police' },
                hospital:{ emoji: '🏥', cls: 'hospital' }
            };
            var c = cfg[type] || cfg.fuel;
            var shortName = (name || '').length > 14 ? name.substring(0, 12) + '...' : (name || '');
            return L.divIcon({
                className: 'poi-map-marker',
                html: '<div class="poi-pin ' + c.cls + '"><span class="pin-e">' + c.emoji + '</span></div>'
                    + (shortName ? '<div class="poi-lbl">' + shortName + '</div>' : ''),
                iconSize: [42, shortName ? 66 : 50],
                iconAnchor: [21, 21]
            });
        }

        /* ==========================================
           Set Points
        ========================================== */
        function setStartPoint(lat, lng, skipReverse) {
            if (startMarker) map.removeLayer(startMarker);
            startCoords = { lat: lat, lng: lng };
            startMarker = L.marker([lat, lng], {
                icon: makeEndpointIcon('start', 'A'),
                draggable: true
            }).addTo(map);

            if (!skipReverse) reverseGeocode(lat, lng, 'startInput');

            startMarker.on('dragend', function(e) {
                var p = e.target.getLatLng();
                startCoords = { lat: p.lat, lng: p.lng };
                reverseGeocode(p.lat, p.lng, 'startInput');
                if (endCoords) findRoute();
            });
        }

        function setEndPoint(lat, lng, skipReverse) {
            if (endMarker) map.removeLayer(endMarker);
            endCoords = { lat: lat, lng: lng };
            endMarker = L.marker([lat, lng], {
                icon: makeEndpointIcon('end', 'B'),
                draggable: true
            }).addTo(map);

            if (!skipReverse) reverseGeocode(lat, lng, 'endInput');

            endMarker.on('dragend', function(e) {
                var p = e.target.getLatLng();
                endCoords = { lat: p.lat, lng: p.lng };
                reverseGeocode(p.lat, p.lng, 'endInput');
                if (startCoords) findRoute();
            });
        }

        /* ==========================================
           Geocoding (Nominatim - free, no key)
        ========================================== */
        function geocode(query) {
            return fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=1', {
                headers: { 'Accept-Language': 'en' }
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.length > 0) {
                    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
                }
                return null;
            });
        }

        function reverseGeocode(lat, lng, inputId) {
            fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.display_name) {
                        var parts = data.display_name.split(',');
                        document.getElementById(inputId).value = parts.slice(0, 3).join(',').trim();
                    }
                })
                .catch(function() {
                    document.getElementById(inputId).value = lat.toFixed(5) + ', ' + lng.toFixed(5);
                });
        }

        /* ==========================================
           Route Finding (OSRM - direct, FAST)
        ========================================== */
        function findRoute() {
            var startVal = document.getElementById('startInput').value.trim();
            var endVal = document.getElementById('endInput').value.trim();
            var btn = document.getElementById('findRouteBtn');

            // Cancel any in-flight route request
            if (routeController) routeController.abort();
            routeController = new AbortController();

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Finding...';

            // Build promise chain: geocode if needed, then route
            var chain = Promise.resolve();

            if (!startCoords && startVal) {
                chain = chain.then(function() {
                    return geocode(startVal).then(function(r) {
                        if (!r) throw new Error('Could not find starting point');
                        setStartPoint(r.lat, r.lng, true);
                        document.getElementById('startInput').value = r.name.split(',').slice(0, 3).join(',').trim();
                    });
                });
            }
            if (!endCoords && endVal) {
                chain = chain.then(function() {
                    return geocode(endVal).then(function(r) {
                        if (!r) throw new Error('Could not find destination');
                        setEndPoint(r.lat, r.lng, true);
                        document.getElementById('endInput').value = r.name.split(',').slice(0, 3).join(',').trim();
                    });
                });
            }

            chain.then(function() {
                if (!startCoords || !endCoords) throw new Error('Please set both starting point and destination');

                // Check minimum distance
                var d = map.distance([startCoords.lat, startCoords.lng], [endCoords.lat, endCoords.lng]);
                if (d < 50) throw new Error('Start and end points are too close');

                // Direct OSRM call - fastest possible
                var url = 'https://router.project-osrm.org/route/v1/driving/'
                    + startCoords.lng + ',' + startCoords.lat + ';'
                    + endCoords.lng + ',' + endCoords.lat
                    + '?overview=full&geometries=geojson';

                return fetch(url, { signal: routeController.signal })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.code !== 'Ok' || !data.routes || data.routes.length === 0) {
                            throw new Error('No driving route found between these points');
                        }
                        return data.routes[0];
                    });
            }).then(function(route) {
                var coords = route.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });

                // Clear old route
                clearRoute();

                // Draw route: glow + main animated line
                var glow = L.polyline(coords, {
                    color: '#FF6B35', weight: 16, opacity: 0.1,
                    lineCap: 'round', lineJoin: 'round'
                }).addTo(map);

                var mid = L.polyline(coords, {
                    color: '#FF6B35', weight: 7, opacity: 0.35,
                    lineCap: 'round', lineJoin: 'round'
                }).addTo(map);

                // Use SVG renderer for the animated main line
                var main = L.polyline(coords, {
                    color: '#FF8F5E', weight: 4, opacity: 0.95,
                    lineCap: 'round', lineJoin: 'round',
                    className: 'route-dash',
                    renderer: L.svg()
                }).addTo(map);

                routeLayers.push(glow, mid, main);

                // Fit to route
                map.fitBounds(L.latLngBounds(coords).pad(0.12));

                // Route stats
                var km = (route.distance / 1000).toFixed(1);
                var totalMin = Math.round(route.duration / 60);
                var h = Math.floor(totalMin / 60);
                var m = totalMin % 60;
                var timeStr = h > 0 ? h + 'h ' + m + 'm' : m + ' min';
                document.getElementById('routeDistance').textContent = km + ' km';
                document.getElementById('routeTime').textContent = timeStr;
                document.getElementById('routeInfo').classList.add('active');

                // Load POIs along route independently (don't block UI)
                loadPOIsAlongRoute(coords);

                showToast('Route found — ' + km + ' km, ' + timeStr, 'success');
            }).catch(function(err) {
                if (err.name !== 'AbortError') {
                    showToast(err.message || 'Failed to find route', 'error');
                }
            }).finally(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-route"></i> Find Route';
            });
        }

        /* ==========================================
           POI Loading (Overpass API)
        ========================================== */
        function loadPOIsAround(lat, lng, radiusM) {
            showPOILoading();
            var dLat = radiusM / 111000;
            var dLng = radiusM / (111000 * Math.cos(lat * Math.PI / 180));
            var bbox = (lat - dLat) + ',' + (lng - dLng) + ',' + (lat + dLat) + ',' + (lng + dLng);
            var query = '[out:json][timeout:8];(node["amenity"="fuel"](' + bbox + ');node["amenity"="police"](' + bbox + ');node["amenity"="hospital"](' + bbox + '););out body 25;';

            fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                body: 'data=' + encodeURIComponent(query)
            }).then(function(r) { return r.json(); })
              .then(function(data) { displayPOIs(data.elements); })
              .catch(function() { showPOIEmpty('Could not load nearby places. Try finding a route.'); });
        }

        function loadPOIsAlongRoute(coords) {
            showPOILoading();
            var bounds = L.latLngBounds(coords);
            var s = bounds.getSouth(), w = bounds.getWest(), n = bounds.getNorth(), e = bounds.getEast();
            var query = '[out:json][timeout:10];(node["amenity"="fuel"](' + s + ',' + w + ',' + n + ',' + e + ');node["amenity"="police"](' + s + ',' + w + ',' + n + ',' + e + ');node["amenity"="hospital"](' + s + ',' + w + ',' + n + ',' + e + '););out body 30;';

            var controller = new AbortController();
            var tid = setTimeout(function() { controller.abort(); }, 10000);

            fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                body: 'data=' + encodeURIComponent(query),
                signal: controller.signal
            }).then(function(r) { return r.json(); })
              .then(function(data) { clearTimeout(tid); displayPOIs(data.elements); })
              .catch(function() { clearTimeout(tid); showPOIEmpty('Could not load places along this route.'); });
        }

        /* ==========================================
           POI Display
        ========================================== */
        function displayPOIs(elements) {
            // Clear old POI markers from map
            poiMarkers.forEach(function(m) { map.removeLayer(m); });
            poiMarkers = [];

            var cats = { fuel: [], police: [], hospital: [] };
            var defaultNames = { fuel: 'Fuel Station', police: 'Police Station', hospital: 'Hospital' };

            elements.forEach(function(el) {
                if (!el.tags || !el.tags.amenity) return;
                var t = el.tags.amenity;
                if (cats[t]) {
                    cats[t].push({
                        name: el.tags.name || defaultNames[t],
                        lat: el.lat,
                        lng: el.lon
                    });
                }
            });

            var container = document.getElementById('poiSections');
            container.innerHTML = '';

            var cfg = [
                { key: 'fuel',    emoji: '⛽', label: 'Fuel Stations',  bgCls: 'fuel-bg' },
                { key: 'police',  emoji: '🚔', label: 'Police Stations', bgCls: 'police-bg' },
                { key: 'hospital',emoji: '🏥', label: 'Hospitals',      bgCls: 'hospital-bg' }
            ];

            var hasAny = false;
            var firstDone = false;

            cfg.forEach(function(cat) {
                var items = cats[cat.key];
                if (!items.length) return;
                hasAny = true;

                var section = document.createElement('div');
                section.className = 'poi-category';

                var header = document.createElement('div');
                header.className = 'poi-category-header' + (firstDone ? '' : ' expanded');
                header.innerHTML = '<div class="emoji ' + cat.bgCls + '">' + cat.emoji + '</div>'
                    + '<div class="name">' + cat.label + '</div>'
                    + '<div class="count">' + items.length + '</div>'
                    + '<i class="fas fa-chevron-down chevron"></i>';

                var list = document.createElement('div');
                list.className = 'poi-list' + (firstDone ? '' : ' expanded');
                firstDone = true;

                items.forEach(function(item) {
                    // Map marker
                    var marker = L.marker([item.lat, item.lng], {
                        icon: makePOIIcon(cat.key, item.name)
                    });
                    marker.bindPopup(
                        '<div class="popup-title">' + cat.emoji + ' ' + item.name + '</div>'
                        + '<div class="popup-type">' + cat.label.replace('s', '') + '</div>'
                        + '<div class="popup-coords">' + item.lat.toFixed(5) + ', ' + item.lng.toFixed(5) + '</div>'
                    );
                    marker.addTo(map);
                    poiMarkers.push(marker);

                    // Sidebar list item
                    var li = document.createElement('div');
                    li.className = 'poi-item';
                    li.innerHTML = '<span class="poi-emoji">' + cat.emoji + '</span>'
                        + '<span class="poi-name">' + item.name + '</span>'
                        + '<i class="fas fa-chevron-right poi-arrow"></i>';
                    li.addEventListener('click', function() {
                        map.setView([item.lat, item.lng], 16, { animate: true });
                        marker.openPopup();
                        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    });
                    list.appendChild(li);
                });

                header.addEventListener('click', function() {
                    header.classList.toggle('expanded');
                    list.classList.toggle('expanded');
                });

                section.appendChild(header);
                section.appendChild(list);
                container.appendChild(section);
            });

            if (!hasAny) {
                showPOIEmpty('No fuel stations, police stations, or hospitals found in this area.');
            }
        }

        function showPOILoading() {
            document.getElementById('poiSections').innerHTML =
                '<div class="loading-indicator"><div class="spinner"></div><span>Searching nearby places...</span></div>';
        }

        function showPOIEmpty(msg) {
            document.getElementById('poiSections').innerHTML =
                '<div class="empty-state"><div class="empty-icon">📍</div><p>' + msg + '</p></div>';
        }

        /* ==========================================
           Utilities
        ========================================== */
        function clearRoute() {
            routeLayers.forEach(function(l) { map.removeLayer(l); });
            routeLayers = [];
        }

        function clearAll() {
            clearRoute();
            if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
            if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
            poiMarkers.forEach(function(m) { map.removeLayer(m); });
            poiMarkers = [];
            startCoords = null;
            endCoords = null;
            document.getElementById('startInput').value = '';
            document.getElementById('endInput').value = '';
            document.getElementById('routeInfo').classList.remove('active');
            var c = map.getCenter();
            loadPOIsAround(c.lat, c.lng, 5000);
            showToast('Cleared all markers and route', 'info');
        }

        function useMyLocation() {
            if (!navigator.geolocation) {
                showToast('Geolocation not supported by your browser', 'error');
                return;
            }
            showToast('Detecting your location...', 'info');
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    setStartPoint(pos.coords.latitude, pos.coords.longitude);
                    map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                    showToast('Your location set as starting point', 'success');
                },
                function(err) {
                    showToast('Location error: ' + err.message, 'error');
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(function() { toast.classList.add('show'); });
            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3500);
        }

        /* ==========================================
           Event Listeners
        ========================================== */
        document.getElementById('findRouteBtn').addEventListener('click', findRoute);
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('locBtn').addEventListener('click', useMyLocation);
        document.getElementById('mobileToggle').addEventListener('click', toggleSidebar);

        // Enter key in inputs triggers route
        document.getElementById('startInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                startCoords = null;
                if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
                findRoute();
            }
        });
        document.getElementById('endInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                endCoords = null;
                if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
                findRoute();
            }
        });

        // Close sidebar on map click (mobile)
        map && map.on('click', function() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });

        /* ==========================================
           Initialize
        ========================================== */
        initMap();
    </script>
</body>
</html>
